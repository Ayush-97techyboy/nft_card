<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="card__images">
          <img src="./images/equilibrium.jpg" alt="equilibrium" />
          <div class="card__images-layer">
            <svg width="48" height="48" xmlns="http://www.w3.org/2000/svg">
              <g fill="none" fill-rule="evenodd">
                <path d="M0 0h48v48H0z" />
                <path
                  d="M24 9C14 9 5.46 15.22 2 24c3.46 8.78 12 15 22 15 10.01 0 18.54-6.22 22-15-3.46-8.78-11.99-15-22-15Zm0 25c-5.52 0-10-4.48-10-10s4.48-10 10-10 10 4.48 10 10-4.48 10-10 10Zm0-16c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6Z"
                  fill="#FFF"
                  fill-rule="nonzero"
                />
              </g>
            </svg>
          </div>
        </div>
        <div class="card-content">
          <h1 class="card__title">Equilibrium #3429</h1>
          <p>Our Equilibrium collection promotes balance & calm</p>
          <div class="card-elem">
            <p id="price">0.24 ETH</p>
            <p id="time">24 hours left</p>
          </div>
          <br />
          <hr />
          <div class="card__creator">
            <img src="./images/Ayu.png" alt="Avatar" class="avatar" />
            <p id="creator">Creation of <span id="name">Ayush Mishra</span></p>
          </div>
        </div>
      </div>
      <p class="attribution">
        Challange by <a href="https://www.crio.do">Crio.do</a> Coded by
        <a href="https://github.com/Ayush-97techyboy">Ayush Mishra</a>
      </p>
    </div>
  </body>
</html>
